name: Build & Push Curezy AURANET to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'ai-service/**'
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Curezy AURANET image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            gouravpatidar/curezy-auranet:latest
            gouravpatidar/curezy-auranet:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image build complete
        run: |
          echo "✅ gouravpatidar/curezy-auranet:latest pushed to Docker Hub"
          echo "📌 SHA tag: gouravpatidar/curezy-auranet:${{ github.sha }}"
